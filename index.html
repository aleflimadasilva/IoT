<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel IoT 2.0 | Alef</title>

    <script src="https://unpkg.com"></script>
    <script src="https://cdn.jsdelivr.net"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0a0000;
            color: white;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: #111827;
            border-radius: 12px;
            padding: 20px;
            width: 350px;
            text-align: center;
            box-shadow: 0 0 15px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* GAUGE */
        .gauge {
            position: relative;
            width: 260px;
            height: 150px;
            margin: auto;
        }
        
        svg { width: 100%; }

        .needle {
            width: 4px;
            height: 95px;
            background: linear-gradient(to top, #fff, #38bdf8);
            position: absolute;
            bottom: 18px;
            left: 50%;
            transform-origin: center bottom;
            transform: translateX(-50%) rotate(-90deg);
            transition: transform 0.4s ease-out;
            border-radius: 2px;
            box-shadow: 0 0 10px rgba(56,189,248,0.7);
        }

        .center-value {
            font-size: 32px;
            font-weight: bold;
            margin-top: 10px;
        }

        .gauge .center-value {
            position: absolute;
            bottom: 5px;
            width: 100%;
        }

        .status {
            margin-top: 15px;
            font-size: 14px;
            color: #94a3b8;
        }

        .alert {
            animation: blink 1s infinite;
            color: #ef4444;
        }

        @keyframes blink { 50% { opacity: 0.3; } }

        canvas { margin-top: 20px; max-height: 200px; }

        /* BOTÃO DOWNLOAD */
        .btn-download {
            margin-top: 15px;
            padding: 10px;
            cursor: pointer;
            border-radius: 8px;
            border: none;
            background: #38bdf8;
            color: #000;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-download:hover { background: #7dd3fc; transform: scale(1.05); }
    </style>
</head>

<body>

    <div class="container">

        <!-- CARD 1: GAUGE TEMPERATURA -->
        <div class="card">
            <h2>🌡️ Sensor do Quarto</h2>
            <div class="gauge">
                <svg viewBox="0 0 200 100">
                    <path d="M 10 100 A 90 90 0 0 1 190 100" stroke="#1f2937" stroke-width="14" fill="none" stroke-linecap="round"/>
                    <path d="M 10 100 A 90 90 0 0 1 100 10" stroke="#22c55e" stroke-width="14" fill="none" stroke-linecap="round"/>
                    <path d="M 100 10 A 90 90 0 0 1 150 25" stroke="#facc15" stroke-width="14" fill="none" stroke-linecap="round"/>
                    <path d="M 150 25 A 90 90 0 0 1 190 100" stroke="#ef4444" stroke-width="14" fill="none" stroke-linecap="round"/>
                </svg>
                <div class="needle" id="needle"></div>
                <div class="center-value" id="temp">-- °C</div>
            </div>
            <div class="status" id="status">Conectando...</div>
        </div>

        <!-- CARD 2: GRÁFICO + DOWNLOAD -->
        <div class="card">
            <h2>📈 Linha do Tempo</h2>
            <canvas id="grafico"></canvas>
            <button class="btn-download" onclick="baixarHistorico()">📥 Baixar CSV</button>
            <div class="status" id="count-status">0 leituras salvas</div>
        </div>

        <!-- CARD 3: UMIDADE -->
        <div class="card">
            <h2>💧 Umidade</h2>
            <div style="margin: auto;">
                <div class="center-value" id="valor-umidade" style="font-size: 48px; color: #38bdf8;">-- %</div>
            </div>
            <div class="status">Sensor de Umidade Ativo</div>
        </div>

    </div>

    <script>
        const MQTT_CONFIG = {
            host: "wss://28c03fa8cec54867b74cdb6592fcbc33.s1.eu.hivemq.cloud:8884/mqtt",
            username: "AlefSilva12",
            password: "@Alef123",
            topic: "alefsilva/temperatura"
        };

        const client = mqtt.connect(MQTT_CONFIG.host, {
            username: MQTT_CONFIG.username,
            password: MQTT_CONFIG.password,
            reconnectPeriod: 2000
        });

        // ARMAZENAMENTO PARA DOWNLOAD
        let historicoCSV = [];

        const statusEl = document.getElementById("status");
        const countEl = document.getElementById("count-status");

        client.on("connect", () => {
            statusEl.innerText = "🟢 Conectado";
            client.subscribe(MQTT_CONFIG.topic);
        });

        /* CONFIGURAÇÃO DO GRÁFICO */
        let dadosGrafico = [];
        let labelsGrafico = [];

        const chart = new Chart(document.getElementById("grafico"), {
            type: "line",
            data: {
                labels: labelsGrafico,
                datasets: [{
                    label: "Temperatura",
                    data: dadosGrafico,
                    borderColor: "#38bdf8",
                    backgroundColor: "rgba(56,189,248,0.1)",
                    borderWidth: 2,
                    tension: 0.4,
                    fill: true
                }]
            },
            options: {
                plugins: { legend: { display: false } },
                scales: {
                    x: { ticks: { color: "#94a3b8" } },
                    y: { ticks: { color: "#94a3b8" } }
                }
            }
        });

        /* FUNÇÃO GAUGE */
        function updateGauge(temp) {
            const needle = document.getElementById("needle");
            let normalized = (Math.min(Math.max(temp, -20), 100) + 20) / 120;
            let angle = normalized * 180 - 90;
            needle.style.transform = `translateX(-50%) rotate(${angle}deg)`;

            if (temp > 27) {
                statusEl.innerText = "🔥 ALTA TEMPERATURA";
                statusEl.classList.add("alert");
            } else {
                statusEl.classList.remove("alert");
            }
        }

        /* LOGICA DE DOWNLOAD */
        function baixarHistorico() {
            if (historicoCSV.length === 0) return alert("Sem dados!");
            
            let csvContent = "data:text/csv;charset=utf-8,Data,Hora,Valor\n";
            historicoCSV.forEach(r => csvContent += `${r.data},${r.hora},${r.valor}\n`);

            const link = document.createElement("a");
            link.setAttribute("href", encodeURI(csvContent));
            link.setAttribute("download", "log_sensores.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        /* RECEBIMENTO DE DADOS */
        client.on("message", (topic, message) => {
            const valor = parseFloat(message.toString());
            if (isNaN(valor)) return;

            if (topic === MQTT_CONFIG.topic) {
                const agora = new Date();
                const horaStr = agora.toLocaleTimeString();

                // Salva no histórico completo
                historicoCSV.push({
                    data: agora.toLocaleDateString(),
                    hora: horaStr,
                    valor: valor
                });
                countEl.innerText = `${historicoCSV.length} leituras salvas`;

                // Atualiza visual
                document.getElementById("temp").innerText = valor.toFixed(2) + " °C";
                updateGauge(valor);

                // Atualiza gráfico (limite de 20 pontos)
                dadosGrafico.push(valor);
                labelsGrafico.push(horaStr);
                if (dadosGrafico.length > 20) {
                    dadosGrafico.shift();
                    labelsGrafico.shift();
                }
                chart.update();
            }
        });
    </script>
</body>
</html>
